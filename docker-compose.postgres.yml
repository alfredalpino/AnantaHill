services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - docker/postgres.local.env
    ports:
      - "5434:5432"
    volumes:
      - ananta-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ananta"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  ananta-postgres-data:
